<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="index.css">
    <title>Online IDE</title>
</head>

<body>
    <header id="navigation" class="navigation"></header>
    <main class="container">
        <textarea id="writer"></textarea>
        <custom-view-container class="view-container">
            <section class="menu" id="menu"></section>
            <custom-editor-container class="editor" id="container"></custom-editor-container>
            <custom-search-replace-container class="hidden" id="search-replace"></custom-search-replace-container>
        </custom-view-container>
    </main>

    <script type="module" src="./src/components/viewContainer.js"></script>
    <script type="module" src="./src/components/editorContainer.js"></script>
    <script type="module" src="./src/components/SearchAndReplace/searchAndReplace.js"></script>
    <script src="./app.js" type="module"></script>
</body>

</html>
