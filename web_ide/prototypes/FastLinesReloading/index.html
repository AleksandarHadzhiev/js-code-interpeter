<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="index.css">
    <title>Fast Line Reloading</title>
</head>

<body>
    <main id="container">
        <section class="editor">
            <div class="view">
                <div class="loader" id="loader">
                    <div class="content">
                        <div id="line-numeration"></div>
                        <div id="line-content"></div>
                    </div>
                </div>
            </div>
            <div id="scrollable-area">
                <div id="scrollbar">
                    <div id="bar"></div>
                </div>
            </div>
        </section>
    </main>
    <script src="index.js" type="module"></script>
    <!-- <script src="scrolling.js" type="module"></script> -->
</body>

</html>
